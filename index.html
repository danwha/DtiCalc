<!DOCTYPE html>

<html>

<head>
  <title>DTI Calc</title>

  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <!-- WebApp -->
  <meta name="mobile-web-app-capable" content="yes">

  <meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width" />

  <!--
    https://developers.google.com/speed/libraries?hl=ko 
    https://code.jquery.com/
      https://releases.jquery.com/
  -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <!--
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
  -->

  <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.14.1/themes/smoothness/jquery-ui.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.14.1/jquery-ui.min.js"></script>

<style>
  body{
    background-color: black;
    color: beige;
    font-size: 1vw;
  }
  .titleBar{
    color: white;
  }
  .titleBar .title{
    font-size: 5vw;
    font-weight: bold;
  }
  .titleBar .mName{
    float: right;
  }

  fieldset{
    margin-top: 3vh;
  }
  legend{
    font-size: 7vw;
    font-weight: bold;
  }
  fieldset div{
    margin-top: 3vh;
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }
  fieldset label{
    font-size: 5vw;
    border: 1px;
  }
  fieldset input{
    font-size: 5vw;
    text-align: right;
    padding-right: 5px;
  }
  fieldset .caution{
    margin-top: 0px;
    color: yellow;
    font-size: 2vw;
    display: flex;
    justify-content:right;
  }

  .input-active {
    border: 1px solid red;
    background-color: yellow;
  }
  .input-default {
    border: 1px solid gray;
    background-color: #ccc;
  }

  #DebtToIncome[type="text"]:disabled {
    color: blue;
  }

  .descripter{
    margin-top: 2px;
    justify-content:right;
  }
  .descripter label{
    color: aqua;
    font-size: 4vw;
    font-weight: normal;
  }
</style>

<script>
  focused = object => {
    $('input')
      .removeClass('input-active')
      .addClass('input-default');
    $(object)
      .removeClass('input-default')
      .addClass('input-active');
  }// focused

  unfocused = object => {
    $(object)
    .removeClass('input-default')
    .addClass('input-active');
  }// unfocused

  fixComma = target => {
    let value = $(target).val().replace(/[^0-9]/g, ''); // 숫자 외 제거
    if (value) {
      $(target).val(Number(value).toLocaleString())// 천 단위 콤마 추가
    } else {
      $(target).val('')
    }
    return value
  }// fixComma

  changed = () => {
    const LoanAmount = fixComma($('#LoanAmount'))
    const LoanPeriod = parseFloat($('#LoanPeriod').val()) || 0;
    const LoanInterestRate = parseFloat($('#LoanInterestRate').val()) || 0;

    const IncomeAmount = fixComma($('#IncomeAmount'))
    const DebtAmount = fixComma($('#DebtAmount'))

    const DebtEstimationInterestRate = parseFloat($('#DebtEstimationInterestRate').val()) || 6.2;
    
    const Loan = LoanAmount * LoanInterestRate
    const Debt = DebtAmount * DebtEstimationInterestRate
    const Amount = Loan + Debt
    const ToIncome = Amount / IncomeAmount
    const DTI = ToIncome.toFixed(2)

    
    $('#DescLoanAmount').text(formatKoreanUnit(LoanAmount) + ' 원')
    $('#DescLoanInterestRate').text(LoanInterestRate + ' %')
    $('#DescIncomeAmount').text(formatKoreanUnit(IncomeAmount) + ' 원')
    $('#DescDebtAmount').text(formatKoreanUnit(DebtAmount) + ' 원')
    $('#DescDebtEstimationInterestRate').text(DebtEstimationInterestRate + ' %')

    $('#DebtToIncome').val(DTI)
    $('#DescDebtToIncome').text(formatKoreanUnit(DTI) + ' %')
  }// changed


  function formatKoreanUnit(num) {
    if (num === 0) return "0";

    const units = ["", " 만", " 억", " 조"];
    const result = [];
    let temp = num;

    for (let i = 0; i < units.length; i++) {
      const chunk = temp % 10000;
      if (chunk > 0) {
        result.unshift(`${chunk}${units[i]}`);
      }
      temp = Math.floor(temp / 10000);
      if (temp === 0) break;
    }

    return result.join(" ").trim();
  }
</script>

</head>



<body>
  <div class="titleBar">
    <span class="title">전세자금 대출 DTI 계산기</span>
    <span class="mName">DTI Calc 20260313</span>
  </div>
  
  <fieldset>
    <legend>대출</legend>
    <div>
      <label>금액</label>
      <input id="LoanAmount" class="input-default"
        type="text" min="0" placeholder="대출금액"
        onfocus="focused(this)" onblur="unfocused(this)"
        oninput="changed()">
    </div>
    <div class="descripter">
      <label id="DescLoanAmount">&nbsp;</label>
    </div>

    <div>
      <label>기간</label>
      <input id="LoanPeriod" class="input-default"
        type="number" min="0" placeholder="대출기간" value="24"
        onfocus="focused(this)" onblur="unfocused(this)"
        oninput="changed()">
    </div>

    <div>
      <label>금리</label>
      <input id="LoanInterestRate" class="input-default"
        type="number" min="0" placeholder="대출금리"
        onfocus="focused(this)" onblur="unfocused(this)"
        oninput="changed()">
    </div>
    <div class="descripter">
      <label id="DescLoanInterestRate">0 %</label>
    </div>
  </fieldset>

  <fieldset>
    <legend>상환</legend>
    <div>
      <label>소득</label>
      <input id="IncomeAmount" class="input-default"
        type="text" min="0" placeholder="소득금액"
        onfocus="focused(this)" onblur="unfocused(this)"
        oninput="changed()">
    </div>
    <div class="descripter">
      <label id="DescIncomeAmount">&nbsp;</label>
    </div>

    <div>
      <label>부채</label>
      <input id="DebtAmount" class="input-default"
        type="text" min="0" placeholder="부채금액"
        onfocus="focused(this)" onblur="unfocused(this)"
        oninput="changed()">
    </div>
    <div class="descripter">
      <label id="DescDebtAmount">&nbsp;</label>
    </div>

    <div>
      <label>금리</label>
      <input id="DebtEstimationInterestRate" class="input-default"
        type="number" min="0" placeholder="부채추정금리(기본 6.2%)"
        onfocus="focused(this)" onblur="unfocused(this)"
        oninput="changed()">
    </div>
    <div class="descripter">
      <label id="DescDebtEstimationInterestRate">6.2 %</label>
    </div>
    <div class="caution">
      * 실질금리가 아닌 공사추정금리 입력(미기입의 경우 6.2% 적용)
    </div>

  </fieldset>

  <fieldset>
    <legend>결과</legend>
    <div>
      <label>DTI</label>
      <input id="DebtToIncome" type="text" placeholder="총부채상환비율" disabled>
    </div>
    <div class="descripter">
      <label id="DescDebtToIncome">? %</label>
    </div>
  </fieldset>

</body>
</html>
